services:
  apex-extractor:
    image: alpine:latest
    container_name: apex-extractor
    volumes:
      - .:/workspace
      - apex-install-vol:/opt/oracle/apex
    command: >
      sh -c "if [ ! -f /opt/oracle/apex/apexins.sql ]; then
        echo 'Downloading and Extracting full APEX package...';
        apk add --no-cache unzip wget;
        if [ ! -f /workspace/apex_24.1_en.zip ]; then
          echo 'Zip file not found locally. Downloading from Oracle OTN...';
          wget -qO /workspace/apex_24.1_en.zip https://download.oracle.com/otn_software/apex/apex_24.1_en.zip;
        fi;
        echo 'Extracting to named volume...';
        mkdir -p /tmp/apex_extract;
        unzip -q /workspace/apex_24.1_en.zip -d /tmp/apex_extract;
        mv /tmp/apex_extract/apex/* /opt/oracle/apex/;
        rm -rf /tmp/apex_extract;
        echo 'Extraction complete.';
      else
        echo 'APEX already extracted. Skipping.';
      fi"

  oracle-db:
    image: container-registry.oracle.com/database/enterprise:19.3.0.0
    container_name: oracle-db
    ports:
      - "1522:1521"
      - "5501:5500"
    env_file:
      - .env
    volumes:
      - oracle-data:/opt/oracle/oradata
      - apex-install-vol:/opt/oracle/apex
      - ./setup-scripts-db:/opt/oracle/scripts/setup
    healthcheck:
      test: ["CMD-SHELL", "test -f /opt/oracle/oradata/apex_installed.flag || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 40
    restart: unless-stopped
    depends_on:
      apex-extractor:
        condition: service_completed_successfully

  ords:
    image: container-registry.oracle.com/database/ords:24.1.0
    container_name: ords
    ports:
      - "8080:8181"
    env_file:
      - .env
    environment:
      - APEX_VER=24.1.0
    volumes:
      - ords-config:/etc/ords/config
      - apex-install-vol:/opt/oracle/apex/24.1.0
      - ./conn_string.txt:/opt/oracle/variables/conn_string.txt
    depends_on:
      oracle-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  oracle-data:
  ords-config:
  apex-install-vol:
